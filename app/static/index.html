<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ACME Assistant — AI Chat Observability Demo</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, system-ui, Segoe UI, Roboto, sans-serif;
    margin: 0; background: #0f1117; color: #e6e8ee;
    display: flex; flex-direction: column; height: 100vh;
  }
  header {
    padding: 14px 20px; background: #161a23; border-bottom: 1px solid #262c3a;
  }
  header h1 { font-size: 15px; margin: 0; font-weight: 600; }
  header p { margin: 2px 0 0; font-size: 12px; color: #8b93a7; }
  #log { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
  .msg { max-width: 720px; padding: 10px 14px; border-radius: 12px; line-height: 1.45; white-space: pre-wrap; }
  .user { align-self: flex-end; background: #2f6df6; color: #fff; }
  .bot { align-self: flex-start; background: #1c2130; }
  .meta { align-self: flex-start; font-size: 11px; color: #6c7488; }
  .err { align-self: flex-start; background: #3a1d22; color: #ff9c9c; }
  form { display: flex; gap: 8px; padding: 16px 20px; background: #161a23; border-top: 1px solid #262c3a; }
  input { flex: 1; padding: 11px 14px; border-radius: 10px; border: 1px solid #2c3344; background: #0f1117; color: #e6e8ee; font-size: 14px; }
  button { padding: 11px 18px; border: 0; border-radius: 10px; background: #2f6df6; color: #fff; font-weight: 600; cursor: pointer; }
  button:disabled { opacity: .5; cursor: default; }
</style>
</head>
<body>
  <header>
    <h1>ACME Assistant</h1>
    <p>Sample AI chat app — intentionally emits GenAI observability problems for Dynatrace.</p>
  </header>
  <div id="log"></div>
  <form id="f">
    <input id="m" placeholder="Ask anything…" autocomplete="off" autofocus />
    <button id="b" type="submit">Send</button>
  </form>
<script>
  const log = document.getElementById('log');
  const form = document.getElementById('f');
  const input = document.getElementById('m');
  const btn = document.getElementById('b');
  const sessionId = 'web-' + Math.random().toString(36).slice(2, 8);

  function add(cls, text) {
    const d = document.createElement('div');
    d.className = 'msg ' + cls;
    d.textContent = text;
    log.appendChild(d);
    log.scrollTop = log.scrollHeight;
    return d;
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const message = input.value.trim();
    if (!message) return;
    add('user', message);
    input.value = '';
    btn.disabled = true;
    const t0 = performance.now();
    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: sessionId, message }),
      });
      const data = await res.json();
      const ms = Math.round(performance.now() - t0);
      if (!res.ok) {
        add('err', 'Error: ' + (data.error || res.status));
      } else {
        add('bot', data.answer);
        const model = data.model ? ` · routed to ${data.model}` : '';
        add('meta', `${ms} ms · history: ${data.history_len} msgs${model}`);
      }
    } catch (err) {
      add('err', 'Network error: ' + err.message);
    } finally {
      btn.disabled = false;
      input.focus();
    }
  });
</script>
</body>
</html>
